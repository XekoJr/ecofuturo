services:
  web:
    build: .
    ports:
      - "${APP_PORT:-8091}:80"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-gp}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-gp}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql-lower-case.cnf:/etc/mysql/conf.d/lower-case-table-names.cnf:ro
      - db_data:/var/lib/mysql
      - ./ecofuturo.sql:/docker-entrypoint-initdb.d/ecofuturo.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
